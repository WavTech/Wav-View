<!DOCTYPE html>
<html>
<head>
  <title>Wav-View</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }
    #cesiumContainer {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>
<div id="cesiumContainer"></div>

<script>
window.onload = function () {

  Cesium.Ion.defaultAccessToken = 'YOUR_TOKEN';

  const viewer = new Cesium.Viewer('cesiumContainer', {
    animation: false,
    timeline: false,
    baseLayerPicker: false
  });

  // 🌍 Map
  viewer.imageryLayers.removeAll();
  viewer.imageryLayers.addImageryProvider(
    new Cesium.OpenStreetMapImageryProvider({
      url: "https://a.tile.openstreetmap.org/"
    })
  );

  // 🇺🇸 Camera
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(-98.5795, 39.8283, 2500000)
  });

  // =========================
  // ✈️ FLIGHTS + TRAILS
  // =========================
  const flights = {};

  function updateFlights() {
    fetch("http://localhost:3000/flights")
      .then(res => res.json())
      .then(data => {

        data.states.forEach(f => {

          const id = f[0];
          const position = Cesium.Cartesian3.fromDegrees(f[5], f[6], f[7]);

          if (!flights[id]) {

            const entity = viewer.entities.add({
              position,
              billboard: {
                image: "https://img.icons8.com/ios-filled/50/00ffff/airplane-take-off.png",
                scale: 0.8
              }
            });

            const trail = viewer.entities.add({
              polyline: {
                positions: [],
                width: 2,
                material: Cesium.Color.CYAN
              }
            });

            flights[id] = { entity, trail, path: [] };
          }

          const obj = flights[id];
          obj.entity.position = position;

          obj.path.push(position);
          if (obj.path.length > 20) obj.path.shift();

          obj.trail.polyline.positions = obj.path;

        });

      });
  }

  updateFlights();
  setInterval(updateFlights, 15000);

  // =========================
  // 🛰️ MULTIPLE SATELLITES
  // =========================
  for (let i = 0; i < 5; i++) {
    let lon = -180 + (i * 60);

    const sat = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(lon, 0, 400000),
      billboard: {
        image: "https://img.icons8.com/ios-filled/50/ffffff/satellite.png",
        scale: 0.7
      }
    });

    setInterval(() => {
      lon += 0.3;
      if (lon > 180) lon = -180;
      sat.position = Cesium.Cartesian3.fromDegrees(lon, 0, 400000);
    }, 100);
  }

  // =========================
  // 🚢 SHIPS
  // =========================
  [
    [-90, 29],
    [-122, 37],
    [-74, 40]
  ].forEach(coord => {
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(coord[0], coord[1]),
      billboard: {
        image: "https://img.icons8.com/ios-filled/50/00ff00/ship.png",
        scale: 1.2
      }
    });
  });

  // =========================
  // 🛫 AIRPORTS
  // =========================
  [
    { name: "ATL", lon: -84.4277, lat: 33.6407 },
    { name: "LAX", lon: -118.4085, lat: 33.9416 },
    { name: "JFK", lon: -73.7781, lat: 40.6413 }
  ].forEach(a => {
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(a.lon, a.lat),
      billboard: {
        image: "https://img.icons8.com/ios-filled/50/ffffff/airport.png",
        scale: 0.7
      },
      label: {
        text: a.name,
        fillColor: Cesium.Color.WHITE
      }
    });
  });

};
</script>
</body>
</html>
