<!DOCTYPE html>
<html>
<head>
  <title>Wav-View Intelligence</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      background: black;
    }

    #toggleBtn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 999;
      padding: 8px;
      background: #111;
      color: white;
      border: 1px solid #444;
    }
  </style>
</head>

<body>

<button id="toggleBtn">Toggle Theme</button>
<div id="cesiumContainer"></div>

<script>
window.onload = function () {

  Cesium.Ion.defaultAccessToken = 'YOUR_TOKEN';

  const viewer = new Cesium.Viewer('cesiumContainer', {
    animation: false,
    timeline: false,
    baseLayerPicker: false
  });

  // 🌑 DARK MAP
  function setDark() {
    viewer.imageryLayers.removeAll();
    viewer.imageryLayers.addImageryProvider(
      new Cesium.UrlTemplateImageryProvider({
        url: "https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
      })
    );
  }

  setDark();

  // =========================
  // ✈️ FLIGHTS + LANDING DETECTION
  // =========================
  const flights = {};

  const airports = [
    { name: "ATL", lat: 33.6407, lon: -84.4277 },
    { name: "LAX", lat: 33.9416, lon: -118.4085 },
    { name: "JFK", lat: 40.6413, lon: -73.7781 }
  ];

  function nearAirport(lat, lon) {
    return airports.find(a =>
      Math.abs(a.lat - lat) < 0.5 &&
      Math.abs(a.lon - lon) < 0.5
    );
  }

  function updateFlights() {
    fetch("http://localhost:3000/flights")
      .then(res => res.json())
      .then(data => {

        data.states.forEach(f => {

          if (!f[5] || !f[6]) return;

          const id = f[0];
          const lon = f[5];
          const lat = f[6];
          const alt = f[7] || 10000;

          const pos = Cesium.Cartesian3.fromDegrees(lon, lat, alt);

          if (!flights[id]) {

            const entity = viewer.entities.add({
              position: pos,
              billboard: {
                image: "https://img.icons8.com/ios-filled/50/00ffff/airplane-take-off.png",
                scale: 0.7
              }
            });

            const trail = viewer.entities.add({
              polyline: {
                positions: [],
                width: 3,
                material: new Cesium.PolylineGlowMaterialProperty({
                  glowPower: 0.3,
                  color: Cesium.Color.CYAN
                })
              }
            });

            flights[id] = { entity, trail, path: [] };
          }

          const obj = flights[id];
          obj.entity.position = pos;

          // ✈️ LANDING DETECTION
          const airport = nearAirport(lat, lon);
          if (airport && alt < 2000) {
            obj.entity.label = {
              text: "Landing → " + airport.name,
              fillColor: Cesium.Color.YELLOW
            };
          }

          obj.path.push(pos);
          if (obj.path.length > 25) obj.path.shift();

          obj.trail.polyline.positions = obj.path;

        });

      });
  }

  updateFlights();
  setInterval(updateFlights, 15000);

  // =========================
  // 🛰️ SATELLITES (NAMED)
  // =========================
  const satellites = [
    { name: "ISS", lon: -100 },
    { name: "Starlink-1", lon: -40 },
    { name: "GPS IIF-3", lon: 60 }
  ];

  satellites.forEach(s => {
    let lon = s.lon;

    const sat = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(lon, 0, 400000),
      billboard: {
        image: "https://img.icons8.com/ios-filled/50/ffffff/satellite.png",
        scale: 0.7
      },
      label: {
        text: s.name,
        fillColor: Cesium.Color.WHITE
      }
    });

    setInterval(() => {
      lon += 0.4;
      if (lon > 180) lon = -180;
      sat.position = Cesium.Cartesian3.fromDegrees(lon, 0, 400000);
    }, 100);
  });

  // =========================
  // 📡 BGP OUTAGES
  // =========================
  fetch("http://localhost:3000/bgp")
    .then(res => res.json())
    .then(events => {

      events.forEach(e => {
        viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(e.lon, e.lat),
          billboard: {
            image: "https://img.icons8.com/ios-filled/50/ff0000/wifi-off.png",
            scale: 0.7
          },
          description: "BGP Event: " + e.type
        });
      });

    });

};
</script>

</body>
</html>
