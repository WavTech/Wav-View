<!DOCTYPE html>
<html>
<head>
  <title>World Eye</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="cesiumContainer"></div>

  <script>
    // 🔑 Your Cesium Token
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIyYjI2MjRiMC1kYzQ0LTQ1MjItYjJmZC1mMTQ2MTIyZTYwMjIiLCJpZCI6NDE2NTYyLCJpYXQiOjE3NzU4NDczNzN9.YwRL_qoLYSL8lQjPZE_ttVV9V5ORcungi-rNihZCRQ8';

    // 🌍 Create Globe
    const viewer = new Cesium.Viewer('cesiumContainer');

    // 📍 Test Point (Memphis)
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(-90.0490, 35.1495),
      point: {
        pixelSize: 12,
        color: Cesium.Color.RED
      }
    });

    // ✈️ Example: Add another point (New York)
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(-74.0060, 40.7128),
      point: {
        pixelSize: 10,
        color: Cesium.Color.BLUE
      }
    });
  </script>
</body>
</html>
