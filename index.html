<!DOCTYPE html>
<html>
<head>
  <title>Wav-View</title>

  <!-- Cesium -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #cesiumContainer {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>
  <div id="cesiumContainer"></div>

  <script>
    window.onload = function () {

      // 🔑 TOKEN
      Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIyYjI2MjRiMC1kYzQ0LTQ1MjItYjJmZC1mMTQ2MTIyZTYwMjIiLCJpZCI6NDE2NTYyLCJpYXQiOjE3NzU4NDczNzN9.YwRL_qoLYSL8lQjPZE_ttVV9V5ORcungi-rNihZCRQ8';

      try {

        // 🌍 VIEWER (STABLE CONFIG)
        const viewer = new Cesium.Viewer('cesiumContainer', {
          animation: false,
          timeline: false,
          baseLayerPicker: false
        });

        // 🇺🇸 CAMERA TO USA
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(-98.5795, 39.8283, 2500000),
          duration: 3
        });

        // =========================
        // 🌎 EARTHQUAKES (LIVE)
        // =========================
        fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson")
          .then(res => res.json())
          .then(data => {
            data.features.forEach(eq => {
              const coords = eq.geometry.coordinates;

              viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(coords[0], coords[1]),
                point: {
                  pixelSize: 6,
                  color: Cesium.Color.YELLOW
                },
                description: eq.properties.place
              });
            });
          });

        // =========================
        // ✈️ FLIGHT (SMOOTH MOVEMENT)
        // =========================
        let lon = -120;
        const flight = viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(lon, 35, 10000),
          point: {
            pixelSize: 8,
            color: Cesium.Color.CYAN
          }
        });

        setInterval(() => {
          lon += 0.2;
          flight.position = Cesium.Cartesian3.fromDegrees(lon, 35, 10000);
        }, 200);

        // =========================
        // 🚢 SHIPS (STATIC SAMPLE)
        // =========================
        [
          [-90, 29],
          [-122, 37],
          [-74, 40]
        ].forEach(coord => {
          viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(coord[0], coord[1]),
            point: {
              pixelSize: 8,
              color: Cesium.Color.GREEN
            }
          });
        });

        // =========================
        // 🚗 TRAFFIC ZONE (CONGESTION)
        // =========================
        viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(-90.05, 35.15),
          ellipse: {
            semiMinorAxis: 3000,
            semiMajorAxis: 3000,
            material: Cesium.Color.RED.withAlpha(0.4)
          }
        });

        console.log("All systems loaded");

      } catch (error) {
        console.error("Error:", error);
      }

    };
  </script>
</body>
</html>
